{{define "dashboard-page-usage"}}
<!-- Usage Page -->
<template x-if="page==='usage'">
<div>
    <div class="page-header">
        <h2>Usage Analytics</h2>
        <div class="page-header-controls">
            <div class="usage-mode-toggle">
                <button type="button" class="usage-mode-btn" :class="{active: usageMode==='tokens'}" @click="toggleUsageMode('tokens')">Tokens</button>
                <button type="button" class="usage-mode-btn" :class="{active: usageMode==='costs'}" @click="toggleUsageMode('costs')">Costs</button>
            </div>
            {{template "date-picker" .}}
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}

    <!-- Page-level data filters: every widget below follows them -->
    <div class="usage-page-filters" role="group" aria-label="Usage data filters">
        <select x-model="usageFilterModel" @change="onUsageFilterChanged()" class="usage-log-select" aria-label="Filter by model">
            <option value="">All Models</option>
            <template x-for="m in usageFilterModelOptions()" :key="m">
                <option :value="m" x-text="m"></option>
            </template>
        </select>
        <select x-model="usageFilterProvider" @change="onUsageFilterChanged()" class="usage-log-select" aria-label="Filter by provider">
            <option value="">All Providers</option>
            <template x-for="p in usageFilterProviderOptions()" :key="p">
                <option :value="p" x-text="p"></option>
            </template>
        </select>
        <template x-if="usageFilterLabelOptions().length > 0">
            <select x-model="usageFilterLabel" @change="onUsageFilterChanged()" class="usage-log-select" aria-label="Filter by label">
                <option value="">All Labels</option>
                <template x-for="l in usageFilterLabelOptions()" :key="l">
                    <option :value="l" x-text="l"></option>
                </template>
            </select>
        </template>
        <div class="filter-input-wrap usage-page-filters-user-path">
            <i data-lucide="search" class="filter-input-icon" aria-hidden="true"></i>
            <input type="text" placeholder="User path /team/alpha" aria-label="Filter by user path" x-model="usageFilterUserPath" @input.debounce.300ms="onUsageFilterChanged()" class="filter-input">
        </div>
    </div>

    <!-- Period totals for the active filters -->
    <div class="cards">
        <div class="card">
            <div class="card-label">Total Requests</div>
            <div class="card-value" x-text="formatNumber(usagePageTotalRequests())" :title="usagePageRequestsTitle()">-</div>
        </div>
        <div class="card">
            <div class="card-label">Estimated Cost</div>
            <div class="card-value" x-text="formatCost(usageSummary.total_cost)" :title="usagePageCostTitle()">-</div>
        </div>
        <div class="card" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Cache Saved</div>
            <div class="card-value" x-text="formatCost(cacheOverview.summary.total_saved_cost)">-</div>
        </div>
        <div class="card" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Cache Hits</div>
            <div class="card-value" x-text="formatNumber(cacheOverview.summary.total_hits)">-</div>
        </div>
    </div>

    <!-- Usage by Model Chart -->
    <div class="model-chart-section" x-show="modelUsage.length > 0">
        <div class="model-chart-header">
            <h3 x-text="usageMode === 'tokens' ? 'Token Usage by Model' : 'Cost by Model'"></h3>
            <div class="chart-view-toggle" role="group" aria-label="Model usage view">
                <button type="button" class="chart-view-btn" :class="{active: modelUsageView === 'chart'}" :aria-pressed="modelUsageView === 'chart' ? 'true' : 'false'" aria-label="Show model usage chart" title="Chart" @click="toggleUsageChartView('model', 'chart')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V11M12 19V5M19 19v-8"/></svg>
                </button>
                <button type="button" class="chart-view-btn" :class="{active: modelUsageView === 'table'}" :aria-pressed="modelUsageView === 'table' ? 'true' : 'false'" aria-label="Show model usage table" title="Table" @click="toggleUsageChartView('model', 'table')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16M9 6v12M15 6v12"/></svg>
                </button>
            </div>
        </div>
        <div class="bar-chart-wrap" x-show="modelUsageView === 'chart'">
            <canvas id="usageBarChart"></canvas>
        </div>
        <template x-if="modelUsageView === 'table'">
            <div class="table-wrapper usage-chart-table-wrapper">
                <table class="data-table usage-chart-data-table">
                    <thead>
                        <tr>
                            <th>Model</th>
                            <th>Provider</th>
                            <th class="col-price">Input Tokens</th>
                            <th class="col-price">Output Tokens</th>
                            <th class="col-price">Total Tokens</th>
                            <th class="col-price">Input Cost</th>
                            <th class="col-price">Output Cost</th>
                            <th class="col-price">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="row in modelUsageTableRows()" :key="(row.provider_name || row.provider || '-') + '/' + row.model">
                            <tr>
                                <td class="mono font-size-md" x-text="row.model || '-'"></td>
                                <td><span class="provider-badge" x-text="providerDisplayValue(row) || '-'"></span></td>
                                <td class="col-price" x-text="formatNumber(row.input_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(row.output_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(usageRowTotalTokens(row))"></td>
                                <td class="col-price" x-text="formatCost(row.input_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.output_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.total_cost)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <!-- Usage by User Path Chart -->
    <div class="model-chart-section" x-show="userPathUsageChartVisible()">
        <div class="model-chart-header">
            <h3 x-text="usageMode === 'costs' ? 'Cost by User Path' : 'Usage by User Path'"></h3>
            <div class="chart-view-toggle" role="group" aria-label="User path usage view">
                <button type="button" class="chart-view-btn" :class="{active: userPathUsageView === 'chart'}" :aria-pressed="userPathUsageView === 'chart' ? 'true' : 'false'" aria-label="Show user path usage chart" title="Chart" @click="toggleUsageChartView('userPath', 'chart')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V11M12 19V5M19 19v-8"/></svg>
                </button>
                <button type="button" class="chart-view-btn" :class="{active: userPathUsageView === 'table'}" :aria-pressed="userPathUsageView === 'table' ? 'true' : 'false'" aria-label="Show user path usage table" title="Table" @click="toggleUsageChartView('userPath', 'table')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16M9 6v12M15 6v12"/></svg>
                </button>
            </div>
        </div>
        <div class="bar-chart-wrap" x-show="userPathUsageView === 'chart'">
            <canvas id="usageUserPathChart"></canvas>
        </div>
        <template x-if="userPathUsageView === 'table'">
            <div class="table-wrapper usage-chart-table-wrapper">
                <table class="data-table usage-chart-data-table">
                    <thead>
                        <tr>
                            <th>User Path</th>
                            <th class="col-price">Input Tokens</th>
                            <th class="col-price">Output Tokens</th>
                            <th class="col-price">Total Tokens</th>
                            <th class="col-price">Input Cost</th>
                            <th class="col-price">Output Cost</th>
                            <th class="col-price">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="row in userPathUsageTableRows()" :key="row.user_path || '/'">
                            <tr>
                                <td class="mono font-size-md" x-text="row.user_path || '/'"></td>
                                <td class="col-price" x-text="formatNumber(row.input_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(row.output_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(usageRowTotalTokens(row))"></td>
                                <td class="col-price" x-text="formatCost(row.input_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.output_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.total_cost)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <!-- Usage by Label Chart -->
    <div class="model-chart-section" x-show="labelUsage.length > 0">
        <div class="model-chart-header">
            <div class="inline-help-section" x-data="{ open: false, copyId: 'label-usage-help-copy', showLabel: 'Show label usage help', hideLabel: 'Hide label usage help', text: 'One request can have multiple labels. Such a request counts once under each of its labels, so label rows can overlap and add up to more than the period totals.' }">
                <div class="inline-help-title-row">
                    <h3 x-text="usageMode === 'costs' ? 'Cost by Label' : 'Usage by Label'"></h3>
                    {{template "inline-help-toggle" .}}
                </div>
                <p :id="copyId" class="inline-help-copy" x-show="open" x-transition.opacity.duration.200ms x-text="text"></p>
            </div>
            <div class="chart-view-toggle" role="group" aria-label="Label usage view">
                <button type="button" class="chart-view-btn" :class="{active: labelUsageView === 'chart'}" :aria-pressed="labelUsageView === 'chart' ? 'true' : 'false'" aria-label="Show label usage chart" title="Chart" @click="toggleUsageChartView('label', 'chart')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 19V11M12 19V5M19 19v-8"/></svg>
                </button>
                <button type="button" class="chart-view-btn" :class="{active: labelUsageView === 'table'}" :aria-pressed="labelUsageView === 'table' ? 'true' : 'false'" aria-label="Show label usage table" title="Table" @click="toggleUsageChartView('label', 'table')">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h16M9 6v12M15 6v12"/></svg>
                </button>
            </div>
        </div>
        <div class="bar-chart-wrap" x-show="labelUsageView === 'chart'">
            <canvas id="usageLabelChart"></canvas>
        </div>
        <template x-if="labelUsageView === 'table'">
            <div class="table-wrapper usage-chart-table-wrapper">
                <table class="data-table usage-chart-data-table">
                    <thead>
                        <tr>
                            <th>Label</th>
                            <th class="col-price">Requests</th>
                            <th class="col-price">Input Tokens</th>
                            <th class="col-price">Output Tokens</th>
                            <th class="col-price">Total Tokens</th>
                            <th class="col-price">Input Cost</th>
                            <th class="col-price">Output Cost</th>
                            <th class="col-price">Total Cost</th>
                        </tr>
                    </thead>
                    <tbody>
                        <template x-for="row in labelUsageTableRows()" :key="row.label">
                            <tr>
                                <td>
                                    <button type="button" class="usage-label-chip" :class="{active: usageFilterLabel === row.label}"
                                            :style="labelChipStyle(row.label)" :title="usageLabelChipTitle(row.label)"
                                            @click="toggleUsageLabelFilter(row.label)" x-text="row.label"></button>
                                </td>
                                <td class="col-price" x-text="formatNumber(row.requests)"></td>
                                <td class="col-price" x-text="formatNumber(row.input_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(row.output_tokens)"></td>
                                <td class="col-price" x-text="formatNumber(usageRowTotalTokens(row))"></td>
                                <td class="col-price" x-text="formatCost(row.input_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.output_cost)"></td>
                                <td class="col-price" x-text="formatCost(row.total_cost)"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </template>
    </div>

    <!-- Request Log Section -->
    <div class="usage-log-section">
        <h3>Request Log</h3>
        <div class="usage-log-toolbar">
            <div class="usage-filter-row usage-filter-row-search">
                <div class="filter-input-wrap">
                    <i data-lucide="search" class="filter-input-icon" aria-hidden="true"></i>
                    <input type="text" placeholder="Search by request ID, model, provider..." aria-label="Search by request ID, model, provider" x-model="usageLogSearch" @input.debounce.300ms="fetchUsageLog(true)" class="filter-input">
                </div>
            </div>
            <div class="usage-filter-row usage-filter-row-options">
                <label class="usage-log-checkbox">
                    <input type="checkbox" x-model="usageLogHideCached" @change="fetchUsageLog(true)">
                    <span>Hide cached requests</span>
                </label>
            </div>
        </div>
        <div class="table-wrapper" x-show="usageLog.entries.length > 0">
            <table class="data-table usage-log-table">
                <thead>
                    <tr>
                        <th>Timestamp</th>
                        <th>Provider</th>
                        <th>Model</th>
                        <th>User Path</th>
                        <th x-show="usageLogHasLabels()">Labels</th>
                        <th>Cache</th>
                        <th title="Share of input tokens served from the provider's prompt cache">Provider Cache</th>
                        <th class="col-price" x-text="usageMode === 'costs' ? 'Input Cost' : 'Input'"></th>
                        <th class="col-price" x-text="usageMode === 'costs' ? 'Output Cost' : 'Output'"></th>
                        <th class="col-price" x-text="usageMode === 'costs' ? 'Total Cost' : 'Total'"></th>
                        <th class="col-price" x-show="usageMode === 'tokens'">Cost</th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="entry in usageLog.entries" :key="entry.id">
                        <tr :class="{'usage-log-row-cached': usageEntryCached(entry)}">
                            <td class="mono usage-ts" x-text="formatTimestamp(entry.timestamp)" :title="timestampTitle(entry.timestamp)"></td>
                            <td>
                                <span class="provider-badge" x-text="providerDisplayValue(entry) || '-'"></span>
                            </td>
                            <td class="mono font-size-md" x-text="entry.model"></td>
                            <td class="mono font-size-md" x-text="entry.user_path || '-'"></td>
                            <td class="usage-log-labels-cell" x-show="usageLogHasLabels()">
                                <div class="usage-label-chips" x-show="entryLabels(entry).length > 0">
                                    <template x-for="label in entryLabels(entry)" :key="label">
                                        <button type="button" class="usage-label-chip" :class="{active: usageFilterLabel === label}"
                                                :style="labelChipStyle(label)" :title="usageLabelChipTitle(label)"
                                                @click="toggleUsageLabelFilter(label)" x-text="label"></button>
                                    </template>
                                </div>
                                <span x-show="entryLabels(entry).length === 0">-</span>
                            </td>
                            <td class="usage-log-cache-cell" x-text="usageEntryCacheLabel(entry)"></td>
                            <td class="usage-log-provider-cache-cell" :title="providerCacheTitle(entry)">
                                <span class="audit-prompt-cache-pill mono" x-show="hasProviderCache(entry)" x-text="providerCacheLabel(entry)"></span>
                                <span x-show="!hasProviderCache(entry)">-</span>
                            </td>
                            <td class="col-price"
                                x-text="usageMode === 'costs' ? formatCost(entry.input_cost) : formatNumber(entry.input_tokens)"
                                :title="usageMode === 'costs' ? formatNumber(entry.input_tokens) + ' tokens' : ''"></td>
                            <td class="col-price"
                                x-text="usageMode === 'costs' ? formatCost(entry.output_cost) : formatNumber(entry.output_tokens)"
                                :title="usageMode === 'costs' ? formatNumber(entry.output_tokens) + ' tokens' : ''"></td>
                            <td class="col-price" :title="usageMode === 'costs' ? cachedCostTitle(entry, '') : ''">
                                <span x-text="usageMode === 'costs' ? formatCost(entry.total_cost) : formatNumber(entry.total_tokens)"
                                      :title="usageMode === 'costs' ? cachedCostTitle(entry, formatNumber(entry.total_tokens) + ' tokens\n' + formatCostTooltip(entry)) : ''"></span>
                                <i data-lucide="circle-dollar-sign" class="cost-source-icon" x-show="usageMode === 'costs' && usesResponseCostPricing(entry)" :title="costSourceTooltip(entry)" aria-hidden="true"></i>
                                <i data-lucide="database-zap" class="cache-savings-icon" x-show="usageMode === 'costs' && usageEntryCached(entry)" aria-hidden="true"></i>
                                <span class="caveat-icon" x-show="usageMode === 'costs' && entry.costs_calculation_caveat" :title="entry.costs_calculation_caveat">&#9888;</span>
                            </td>
                            <td class="col-price" x-show="usageMode === 'tokens'"
                                :title="cachedCostTitle(entry, formatCostTooltip(entry))">
                                <span x-text="formatCost(entry.total_cost)"></span>
                                <i data-lucide="circle-dollar-sign" class="cost-source-icon" x-show="usesResponseCostPricing(entry)" :title="costSourceTooltip(entry)" aria-hidden="true"></i>
                                <i data-lucide="database-zap" class="cache-savings-icon" x-show="usageEntryCached(entry)" aria-hidden="true"></i>
                                <span class="caveat-icon" x-show="entry.costs_calculation_caveat" :title="entry.costs_calculation_caveat">&#9888;</span>
                            </td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        <div class="empty-state" x-show="usageLog.entries.length === 0 && !loading && !authError">{{template "no-data-icon"}}</div>
        <!-- Pagination -->
        {{template "pagination" "usageLog"}}
    </div>
</div>
</template>
{{end}}
