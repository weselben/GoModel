{{define "dashboard-page-overview"}}
<!-- Overview Page -->
<template x-if="page==='overview'">
<div>
    <!-- Live Token Throughput -->
    <div class="chart-container live-tokens">
        <div class="chart-container-header">
            <div class="live-tokens-heading">
                <h3>Live Token Throughput</h3>
                <span class="live-tokens-subtitle">
                    <span class="live-dot" :class="{ 'is-streaming': liveTokensActive }" aria-hidden="true"></span>
                    <span x-text="liveTokensWindowLabel()">Last 60 minutes</span>
                </span>
            </div>
            <div class="interval-picker" role="group" aria-label="Live token throughput granularity">
                <template x-for="opt in liveTokensGranularityOptions()" :key="opt.value">
                    <button type="button"
                            class="interval-btn"
                            :class="{active: liveTokensGranularity===opt.value}"
                            :aria-pressed="liveTokensGranularity===opt.value"
                            @click="setLiveTokensGranularity(opt.value)"
                            x-text="opt.label">-</button>
                </template>
            </div>
        </div>
        <div class="live-tokens-legend">
            <div class="live-tokens-legend-item">
                <span class="live-tokens-swatch" style="background: var(--token-input)"></span>
                <span class="live-tokens-legend-label">Input Tokens</span>
                <span class="live-tokens-legend-value mono" x-text="liveTokensLegendValue('input')">-</span>
            </div>
            <div class="live-tokens-legend-item">
                <span class="live-tokens-swatch" style="background: var(--token-output)"></span>
                <span class="live-tokens-legend-label">Output Tokens</span>
                <span class="live-tokens-legend-value mono" x-text="liveTokensLegendValue('output')">-</span>
            </div>
            <div class="live-tokens-legend-item">
                <span class="live-tokens-swatch" style="background: var(--token-prompt)"></span>
                <span class="live-tokens-legend-label">Prompt (Input) Cached</span>
                <span class="live-tokens-legend-value mono" x-text="liveTokensLegendValue('prompt')">-</span>
            </div>
            <div class="live-tokens-legend-item">
                <span class="live-tokens-swatch" style="background: var(--token-local)"></span>
                <span class="live-tokens-legend-label">Locally Cached</span>
                <span class="live-tokens-legend-value mono" x-text="liveTokensLegendValue('local')">-</span>
            </div>
        </div>
        <div class="chart-wrapper">
            <canvas id="liveTokensChart" role="img" :aria-label="liveTokensChartAriaLabel()"></canvas>
            <div class="chart-empty-overlay live-tokens-empty" x-show="!liveTokensHasData()">
                <span class="live-tokens-empty-text">Waiting for live requests…</span>
            </div>
        </div>
    </div>

    <div class="page-header">
        <h2>Usage Overview</h2>
        <div class="page-header-controls">
            {{template "date-picker" .}}
        </div>
    </div>

    <!-- Auth Error Banner -->
    {{template "auth-banner" .}}

    <!-- Summary Cards -->
    <div class="cards">
        <div class="card card-wide">
            <div class="card-label">Tokens</div>
            <div class="card-value cache-token-value">
                <span class="cache-token-part" title="Input tokens">
                    <span x-text="formatNumber(summary.total_input_tokens)">-</span><span class="cache-token-marker">i</span>
                </span>
                <span class="cache-token-operator">+</span>
                <span class="cache-token-part" title="Output tokens">
                    <span x-text="formatNumber(summary.total_output_tokens)">-</span><span class="cache-token-marker">o</span>
                </span>
                <span class="cache-token-operator">=</span>
                <span x-text="formatNumber(summaryTotalTokens())" title="Total tokens">-</span>
            </div>
        </div>
        <div class="card">
            <div class="card-label">Total Requests</div>
            <div class="card-value" x-text="formatNumber(summaryTotalRequests())" :title="summaryTotalRequestsTitle()">-</div>
        </div>
        <div class="card" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Cache Hits</div>
            <div class="card-value" x-text="formatNumber(cacheOverview.summary.total_hits)">-</div>
        </div>
        <div class="card">
            <div class="card-label">Estimated Cost</div>
            <div class="card-value" x-text="formatCost(summary.total_cost)">-</div>
        </div>
        <div class="card card-wide" x-show="cacheAnalyticsEnabled()">
            <div class="card-label">Local Cache</div>
            <div class="card-value cache-token-value">
                <span class="cache-token-part" title="Input tokens">
                    <span x-text="formatNumber(cacheOverview.summary.total_input_tokens)">-</span><span class="cache-token-marker">i</span>
                </span>
                <span class="cache-token-operator">+</span>
                <span class="cache-token-part" title="Output tokens">
                    <span x-text="formatNumber(cacheOverview.summary.total_output_tokens)">-</span><span class="cache-token-marker">o</span>
                </span>
                <span class="cache-token-operator">=</span>
                <span x-text="formatNumber(cacheOverviewTotalTokens())" title="Total tokens">-</span>
            </div>
        </div>
        <div class="card prompt-cache-card" title="Share of input tokens served from the provider prompt cache, over the selected period">
            <div class="card-label">Prompt Cache Rate</div>
            <div class="prompt-cache-gauge" role="img" :aria-label="'Prompt cache rate ' + promptCacheRateText()">
                <canvas id="promptCacheGauge"></canvas>
                <span class="prompt-cache-gauge-value" x-text="promptCacheRateText()">-</span>
            </div>
        </div>
        <div class="card provider-status-flag" x-show="providerStatus.summary.total > 0" :class="providerStatusSummaryClass()">
            <div class="card-label">Provider Status</div>
            <div class="card-value provider-status-value" x-text="providerStatusRatioText()">-</div>
            <button type="button"
                    class="provider-status-card-link"
                    x-show="providerStatusHasIssues()"
                    aria-label="View providers overview"
                    title="View providers overview"
                    x-text="providerStatusSummaryText()"
                    @click="scrollToProviderStatusSection()"></button>
            <span class="provider-status-card-note" x-show="!providerStatusHasIssues()" x-text="providerStatusSummaryText()"></span>
        </div>
    </div>

    <!-- Cache Meter -->
    <div class="cache-meter">
        <div class="cache-meter-header">
            <h3>Tokens</h3>
            <span class="cache-meter-subtitle">Share of input tokens over the selected period</span>
        </div>
        <div class="cache-meter-bar" :class="{ 'is-empty': !cacheMeterVisible() }" role="img" :aria-label="cacheMeterAriaLabel()">
            <template x-for="seg in cacheMeterSegments()" :key="seg.key">
                <div class="cache-meter-segment"
                     :style="'width: ' + seg.pct + '%; background: var(' + seg.colorVar + ')'"
                     :title="cacheMeterSegmentTitle(seg)">
                    <span class="cache-meter-segment-label" x-show="seg.pct >= 8" x-text="seg.pct + '%'"></span>
                </div>
            </template>
            <span class="cache-meter-empty" x-show="!cacheMeterVisible()">No usage in the selected period yet</span>
        </div>
        <div class="cache-meter-legend">
            <template x-for="seg in cacheMeterCategories()" :key="seg.key">
                <div class="cache-meter-legend-item" :title="cacheMeterSegmentTitle(seg)">
                    <span class="cache-meter-swatch" :style="'background: var(' + seg.colorVar + ')'"></span>
                    <span class="cache-meter-legend-label" x-text="seg.label">-</span>
                    <span class="cache-meter-legend-pct mono" x-text="seg.pct + '%'">-</span>
                    <span class="cache-meter-legend-tokens mono" x-text="formatNumber(seg.tokens)">-</span>
                </div>
            </template>
        </div>
    </div>

    <!-- Usage Chart -->
    <div class="chart-container">
        <div class="chart-container-header">
            <h3 x-text="chartTitle()">Daily Token Usage</h3>
            <div class="interval-picker" role="group" aria-label="Usage chart interval">
                <button type="button" class="interval-btn" :class="{active: interval==='daily'}" :aria-pressed="interval==='daily'" @click="setInterval('daily')">Daily</button>
                <button type="button" class="interval-btn" :class="{active: interval==='weekly'}" :aria-pressed="interval==='weekly'" @click="setInterval('weekly')">Weekly</button>
                <button type="button" class="interval-btn" :class="{active: interval==='monthly'}" :aria-pressed="interval==='monthly'" @click="setInterval('monthly')">Monthly</button>
                <button type="button" class="interval-btn" :class="{active: interval==='yearly'}" :aria-pressed="interval==='yearly'" @click="setInterval('yearly')">Yearly</button>
            </div>
        </div>
        <div class="chart-wrapper">
            <canvas id="usageChart"></canvas>
            <div class="chart-empty-overlay" x-show="daily.length === 0 && !loading && !authError">{{template "no-data-icon"}}</div>
        </div>
    </div>

    <!-- Contribution Calendar -->
    <div class="contribution-calendar-section">
        <div class="contribution-calendar-header">
            <h3>Activity</h3>
            <div class="usage-mode-toggle">
                <button type="button" class="usage-mode-btn" :class="{active: calendarMode==='tokens'}" @click="toggleCalendarMode('tokens')">Tokens</button>
                <button type="button" class="usage-mode-btn" :class="{active: calendarMode==='costs'}" @click="toggleCalendarMode('costs')">Costs</button>
            </div>
        </div>
        <div class="contribution-calendar-grid-wrapper">
            <div class="contribution-calendar-day-labels">
                <span></span>
                <span>Mon</span>
                <span></span>
                <span>Wed</span>
                <span></span>
                <span>Fri</span>
                <span></span>
            </div>
            <div class="contribution-calendar-scroll">
                <div class="contribution-calendar-months">
                    <template x-for="ml in calendarMonthLabels()" :key="ml.key">
                        <span class="contribution-calendar-month-label" :style="'grid-column: ' + (ml.col + 1) + ' / span ' + ml.span" x-text="ml.label"></span>
                    </template>
                </div>
                <div class="contribution-calendar-grid">
                    <template x-for="(week, wi) in buildCalendarGrid()" :key="wi">
                        <div class="contribution-calendar-week">
                            <template x-for="(day, di) in week" :key="wi + '-' + di">
                                <div class="contribution-calendar-cell"
                                     :class="[day.empty ? 'empty' : 'level-' + day.level]"
                                     @mouseenter="showCalendarTooltip($event, day)"
                                     @mouseleave="hideCalendarTooltip()"></div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </div>
        <div class="contribution-calendar-footer">
            <div class="contribution-calendar-meta">
                <span class="contribution-calendar-summary" x-text="calendarSummaryText()"></span>
            </div>
            <div class="contribution-calendar-legend">
                <span>Less</span>
                <template x-for="lvl in calendarLegendLevels()" :key="lvl">
                    <div class="contribution-calendar-cell" :class="'level-' + lvl"></div>
                </template>
                <span>More</span>
            </div>
        </div>
    </div>
    <div class="contribution-calendar-tooltip"
         x-show="calendarTooltip.show"
         x-text="calendarTooltip.text"
         :style="'left: ' + calendarTooltip.x + 'px; top: ' + (calendarTooltip.y - 40) + 'px'"></div>

    <div id="provider-status-section" class="provider-status-section" tabindex="-1" x-show="providerStatus.providers.length > 0">
        <div class="provider-status-section-header">
            <div>
                <h3>Providers Overview</h3>
            </div>
            <button type="button"
                    class="provider-status-toggle"
                    role="switch"
                    :aria-checked="providerStatusDetailsExpanded ? 'true' : 'false'"
                    :title="providerStatusDetailsToggleLabel()"
                    @click="toggleProviderStatusDetails()">
                <span class="provider-status-toggle-copy" x-text="providerStatusDetailsToggleLabel()"></span>
                <span class="provider-status-toggle-track" :class="{ 'is-active': providerStatusDetailsExpanded }">
                    <span class="provider-status-toggle-thumb"></span>
                </span>
            </button>
        </div>
        <div class="provider-status-grid">
            <template x-for="provider in providerStatus.providers" :key="provider.name">
                <article class="provider-status-card">
                    <div class="provider-status-card-head">
                        <div>
                            <h4 class="provider-status-name">
                                <span x-text="provider.name"></span>
                                <span class="provider-status-name-type" x-show="providerTypeLabel(provider)" x-text="'(' + providerTypeLabel(provider) + ')'"></span>
                                <a class="inline-help-toggle provider-doc-help"
                                   x-show="providerDocUrl(provider)"
                                   :href="providerDocUrl(provider)"
                                   target="_blank"
                                   rel="noopener noreferrer"
                                   :aria-label="'View ' + (providerTypeLabel(provider) || provider.name) + ' provider docs'"
                                   :title="'View ' + (providerTypeLabel(provider) || provider.name) + ' provider docs'">
                                    <span class="inline-help-toggle-icon" aria-hidden="true">?</span>
                                </a>
                            </h4>
                        </div>
                        <span class="provider-status-pill" :class="providerStatusBadgeClass(provider.status)" x-text="provider.status_label"></span>
                    </div>

                    <div class="provider-status-meta">
                        <div class="provider-status-meta-item">
                            <span class="provider-status-meta-label">Models Available</span>
                            <span class="provider-status-meta-value mono" x-text="formatNumber(provider.runtime.discovered_model_count)"></span>
                        </div>
                        <div class="provider-status-meta-item">
                            <span class="provider-status-meta-label">Last Checked</span>
                            <span class="provider-status-meta-value mono"
                                  x-text="providerLastCheckedTime(provider)"
                                  :title="providerLastCheckedTitle(provider)"></span>
                        </div>
                    </div>

                    <div class="provider-status-details"
                         :class="{ 'is-expanded': providerStatusDetailsExpanded, 'is-collapsed': !providerStatusDetailsExpanded }"
                         :aria-hidden="providerStatusDetailsExpanded ? 'false' : 'true'">
                        <div class="provider-status-details-inner">
                            <p class="provider-status-reason" x-text="provider.status_reason"></p>
                            <p class="provider-status-error" x-show="provider.last_error" x-text="provider.last_error"></p>

                            <div class="provider-status-config">
                                <div class="provider-status-config-row" x-show="provider.config.base_url">
                                    <span class="provider-status-config-label">Base URL</span>
                                    <code class="provider-status-config-value" x-text="provider.config.base_url"></code>
                                </div>
                                <div class="provider-status-config-row" x-show="provider.config.api_version">
                                    <span class="provider-status-config-label">API Version</span>
                                    <code class="provider-status-config-value" x-text="provider.config.api_version"></code>
                                </div>
                                <div class="provider-status-config-row">
                                    <span class="provider-status-config-label">Configured Models</span>
                                    <span class="provider-status-config-value" x-text="providerModelsSummary(provider)"></span>
                                </div>
                                <div class="provider-status-config-row">
                                    <span class="provider-status-config-label">Retry</span>
                                    <span class="provider-status-config-value" x-text="providerRetrySummary(provider)"></span>
                                </div>
                                <div class="provider-status-config-row">
                                    <span class="provider-status-config-label">Circuit Breaker</span>
                                    <span class="provider-status-config-value" x-text="providerCircuitBreakerSummary(provider)"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </template>
        </div>
    </div>
</div>
</template>
{{end}}
